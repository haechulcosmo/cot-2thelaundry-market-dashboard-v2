name: 월 데이터 업데이트

on:
  workflow_dispatch:
    inputs:
      month:
        description: "업데이트할 월 (YYYY-MM, 비워두면 직전 월)"
        required: false
        type: string
  schedule:
    # 매월 1일 오전 9시(KST)에 직전 월을 마감 갱신
    - cron: "0 0 1 * *"
    # 대시보드에서 접수된 수동 갱신 요청 확인
    - cron: "*/30 * * * *"

permissions:
  contents: write

concurrency:
  group: monthly-market-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 소스 받기
        uses: actions/checkout@v4

      - name: 실행 대상 확인
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_MONTH: ${{ inputs.month }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          event = os.environ.get("EVENT_NAME", "")
          schedule = os.environ.get("EVENT_SCHEDULE", "")
          month = os.environ.get("INPUT_MONTH", "")
          run = event == "workflow_dispatch" or schedule == "0 0 1 * *"
          requested = False
          requested_at = ""

          if schedule == "*/30 * * * *":
              try:
                  with urllib.request.urlopen(
                      "https://thelaundry-market-dashboard.thelaundry-market-2026.workers.dev/api/update",
                      timeout=20,
                  ) as response:
                      status = json.load(response).get("status") or {}
                  if status.get("state") == "requested" and status.get("month"):
                      run = True
                      requested = True
                      month = status["month"]
                      requested_at = status.get("requestedAt", "")
              except Exception as exc:
                  print(f"수동 갱신 요청 확인 실패: {exc}")

          output = os.environ["GITHUB_OUTPUT"]
          with open(output, "a", encoding="utf-8") as fp:
              fp.write(f"run={'true' if run else 'false'}\n")
              fp.write(f"requested={'true' if requested else 'false'}\n")
              fp.write(f"month={month}\n")
              fp.write(f"requested_at={requested_at}\n")
          PY

      - name: Python 준비
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 수집 라이브러리 설치
        if: steps.gate.outputs.run == 'true'
        run: pip install requests beautifulsoup4

      - name: DB랜드·QDB·네이버 수집 및 대시보드 반영
        if: steps.gate.outputs.run == 'true'
        env:
          UPDATE_MONTH: ${{ steps.gate.outputs.month }}
        run: python automation/monthly_update.py --month "$UPDATE_MONTH"

      - name: 결과 요약
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "## 더런드리 월 데이터 업데이트" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat automation/last-update.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: 변경사항 저장
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "더런드리 업데이트 봇"
          git config user.email "actions@users.noreply.github.com"
          git add index.html automation/last-update.json
          if git diff --cached --quiet; then
            echo "추가할 새 데이터가 없습니다."
          else
            git commit -m "data: 월별 빨래방 시장 데이터 업데이트"
            git push
          fi

      - name: 갱신된 대시보드 배포
        if: steps.gate.outputs.run == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: 5c79c5d1542add21beb7611104f4050d
          command: deploy

      - name: 수동 갱신 완료 알림
        if: success() && steps.gate.outputs.requested == 'true'
        env:
          UPDATE_MONTH: ${{ steps.gate.outputs.month }}
          REQUESTED_AT: ${{ steps.gate.outputs.requested_at }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime, timezone

          try:
              with open("automation/last-update.json", encoding="utf-8") as fp:
                  summary = json.load(fp)
          except FileNotFoundError:
              summary = {}

          payload = json.dumps({
              "state": "completed",
              "month": os.environ.get("UPDATE_MONTH", ""),
              "requestedAt": os.environ.get("REQUESTED_AT", ""),
              "completedAt": datetime.now(timezone.utc).isoformat(),
              "summary": summary,
          }, ensure_ascii=False).encode("utf-8")
          request = urllib.request.Request(
              "https://thelaundry-market-dashboard.thelaundry-market-2026.workers.dev/api/update/complete",
              data=payload,
              method="POST",
              headers={
                  "Content-Type": "application/json",
                  "x-update-callback": "c7ef1d9a4b6240f69837e2ab51d2c8f4",
              },
          )
          with urllib.request.urlopen(request, timeout=20) as response:
              print(response.read().decode("utf-8"))
          PY
