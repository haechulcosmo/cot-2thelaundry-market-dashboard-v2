name: Cloudflare 배포

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "history.html"
      - "cloud.js"
      - "src/**"
      - "wrangler.toml"
      - ".github/workflows/deploy-cloudflare.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 소스 받기
        uses: actions/checkout@v4

      - name: Cloudflare Worker 배포
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_DEPLOY_TOKEN }}
          accountId: 5c79c5d1542add21beb7611104f4050d
          command: deploy
